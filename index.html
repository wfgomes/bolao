<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bolão Copa 2026</title>

<style>

body{
    font-family: Arial;
    max-width:800px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
}

th{
    background:#0d6efd;
    color:white;
}

.posicao{
    width:80px;
    text-align:center;
}

</style>
</head>
<body>

<h1>🏆 Classificação do Bolão</h1>

<table>

<thead>
<tr>
<th>Posição</th>
<th>Participante</th>
<th>Pontos</th>
</tr>
</thead>

<tbody id="ranking"></tbody>

</table>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzr94hkk94XHTH_DCqGgonglSi9FGUg5WLC0UJgQi-cMpKlS8wCeKspvvRLoGhcNlH0EA/exec";

async function carregarRanking(){

    const resposta = await fetch(URL);
    const dados = await resposta.json();

    dados.sort((a,b)=>b.pontos-a.pontos);

    const tbody =
      document.getElementById("ranking");

    tbody.innerHTML="";

    dados.forEach((item,index)=>{

        tbody.innerHTML += `
        <tr>
          <td>${index+1}</td>
          <td>${item.nome}</td>
          <td>${item.pontos}</td>
        </tr>`;
    });
}

carregarRanking();

setInterval(carregarRanking,30000);

</script>

</body>
</html>
